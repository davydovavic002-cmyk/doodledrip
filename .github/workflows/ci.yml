name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Pack Linux .next
        if: github.event_name == 'push'
        run: tar -czf doodledrip-next.tar.gz .next

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: doodledrip-next-linux
          path: doodledrip-next.tar.gz
          retention-days: 14
          compression-level: 0
