name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Assemble standalone package
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          test -f .next/standalone/server.js
          du -sh .next .next/standalone
          # Fail if package is suspiciously tiny (last broken artifact was ~4MB)
          BYTES=$(du -sb .next/standalone | cut -f1)
          echo "standalone bytes=$BYTES"
          if [ "$BYTES" -lt 10000000 ]; then
            echo "Standalone package too small — build looks incomplete"
            exit 1
          fi
          tar -czf doodledrip-standalone.tar.gz -C .next/standalone .
          ls -lh doodledrip-standalone.tar.gz

      - name: Upload standalone artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: doodledrip-standalone-linux
          path: doodledrip-standalone.tar.gz
          retention-days: 14
